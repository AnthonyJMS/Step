<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STEP JMS">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>STEP — Jeannine Manuel School</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1565C0;
      --blue-light: #1E88E5;
      --blue-bg: #E3F2FD;
      --orange: #E64A19;
      --orange-light: #FF7043;
      --orange-bg: #FBE9E7;
      --dark: #1A1A2E;
      --dark2: #16213E;
      --white: #FFFFFF;
      --grey: #F5F5F5;
      --text: #1A1A2E;
      --text-muted: #666;
      --radius: 18px;
      --shadow: 0 4px 20px rgba(0,0,0,0.12);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.18);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
      background: var(--dark);
      color: var(--white);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }

    /* ===== SCREENS ===== */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      transform: translateY(20px);
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    /* ===== HOME SCREEN ===== */
    #screen-home {
      background: linear-gradient(145deg, #0D1B2A 0%, #1A1A2E 50%, #16213E 100%);
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 40px 32px;
    }

    .home-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .home-logo {
      font-size: 88px;
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, #FFFFFF 0%, #90CAF9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .home-subtitle {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .home-categories {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 520px;
    }

    .cat-card {
      border-radius: 24px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .cat-card:active { transform: scale(0.97); }
    .cat-card.blue {
      background: linear-gradient(135deg, #1565C0 0%, #1E88E5 100%);
      box-shadow: 0 8px 32px rgba(21,101,192,0.4);
    }
    .cat-card.orange {
      background: linear-gradient(135deg, #BF360C 0%, #E64A19 100%);
      box-shadow: 0 8px 32px rgba(230,74,25,0.4);
    }
    .cat-card::before {
      content: '';
      position: absolute;
      top: -40%;
      right: -10%;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .cat-icon {
      font-size: 44px;
      flex-shrink: 0;
    }
    .cat-info { flex: 1; }
    .cat-title {
      font-size: 22px;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }
    .cat-count {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      font-weight: 500;
    }
    .cat-arrow {
      font-size: 24px;
      color: rgba(255,255,255,0.6);
    }

    /* ===== CATEGORY SCREEN ===== */
    #screen-marche, #screen-tapup {
      display: flex;
      flex-direction: column;
    }

    .screen-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px 16px;
      flex-shrink: 0;
    }
    .screen-header.blue { background: linear-gradient(135deg, #0D47A1, #1565C0); }
    .screen-header.orange { background: linear-gradient(135deg, #BF360C, #E64A19); }

    .btn-back {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .btn-back:active { background: rgba(255,255,255,0.3); }

    .screen-title {
      font-size: 20px;
      font-weight: 700;
      color: white;
      flex: 1;
    }
    .screen-title small {
      display: block;
      font-size: 13px;
      font-weight: 400;
      opacity: 0.7;
      margin-top: 2px;
    }

    .steps-grid {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      align-content: start;
      background: var(--dark);
    }

    .step-btn {
      border-radius: 18px;
      padding: 22px 16px;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
      min-height: 100px;
    }
    .step-btn:active { transform: scale(0.95); }
    .step-btn.blue {
      background: linear-gradient(145deg, #1A2744, #1E3A6E);
      box-shadow: 0 4px 16px rgba(21,101,192,0.25);
      border: 1px solid rgba(30,136,229,0.25);
    }
    .step-btn.blue:active { box-shadow: 0 2px 8px rgba(21,101,192,0.3); }
    .step-btn.orange {
      background: linear-gradient(145deg, #2A1A10, #3D1F0D);
      box-shadow: 0 4px 16px rgba(230,74,25,0.2);
      border: 1px solid rgba(230,74,25,0.25);
    }
    .step-btn.orange:active { box-shadow: 0 2px 8px rgba(230,74,25,0.3); }

    .step-btn-icon {
      font-size: 32px;
    }
    .step-btn-name {
      font-size: 15px;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }
    .step-btn-desc {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.55;
      color: white;
    }

    /* ===== VIDEO SCREEN ===== */
    #screen-video {
      background: #000;
      flex-direction: column;
    }

    .video-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      flex-shrink: 0;
      z-index: 10;
    }
    .video-header.blue { background: linear-gradient(135deg, #0D47A1, #1565C0); }
    .video-header.orange { background: linear-gradient(135deg, #BF360C, #E64A19); }

    .video-title {
      font-size: 22px;
      font-weight: 800;
      color: white;
      flex: 1;
      letter-spacing: 1px;
    }
    .video-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      font-weight: 500;
      margin-top: 2px;
    }

    .video-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    #step-video {
      /* Native aspect ratio: no black bars, no content cropped */
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      display: block;
    }

    .video-controls {
      padding: 16px 24px 24px;
      background: #111;
      flex-shrink: 0;
    }

    .progress-bar-wrap {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      margin-bottom: 14px;
      cursor: pointer;
      position: relative;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #1E88E5, #42A5F5);
      width: 0%;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    .progress-bar-fill.orange-fill {
      background: linear-gradient(90deg, #E64A19, #FF7043);
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .ctrl-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.2); transform: scale(0.93); }
    .ctrl-btn.play-btn {
      width: 68px; height: 68px;
      font-size: 28px;
      background: var(--blue-light);
    }
    .ctrl-btn.play-btn.orange-play { background: var(--orange-light); }
    .ctrl-btn.play-btn:active { transform: scale(0.9); }

    .time-display {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      font-variant-numeric: tabular-nums;
      min-width: 80px;
      text-align: center;
    }

    .nav-row {
      display: flex;
      gap: 12px;
      margin-top: 14px;
    }
    .nav-btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .nav-btn:active { background: rgba(255,255,255,0.15); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    /* ===== LOADING STATE ===== */
    .video-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 16px;
      gap: 12px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .video-loading.hidden { display: none; }

    /* safe areas for iPad */
    @supports (padding: env(safe-area-inset-bottom)) {
      .video-controls { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
      .steps-grid { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
      #screen-home { padding-bottom: calc(40px + env(safe-area-inset-bottom)); }
    }

    /* Landscape adjustments */
    @media (orientation: landscape) {
      .home-logo { font-size: 60px; }
      .home-header { margin-bottom: 24px; }
      .home-categories { flex-direction: row; max-width: 700px; }
      .cat-card { flex-direction: column; text-align: center; padding: 24px 20px; }
      .cat-info { text-align: center; }
      .steps-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<!-- HOME SCREEN -->
<section id="screen-home" class="screen active">
  <div class="home-header">
    <div class="home-logo">STEP</div>
    <div class="home-subtitle">Jeannine Manuel School</div>
  </div>
  <div class="home-categories">
    <div class="cat-card blue" onclick="showScreen('marche')">
      <div class="cat-icon">🚶</div>
      <div class="cat-info">
        <div class="cat-title">Pas dérivés de la marche</div>
        <div class="cat-count">8 pas</div>
      </div>
      <div class="cat-arrow">›</div>
    </div>
    <div class="cat-card orange" onclick="showScreen('tapup')">
      <div class="cat-icon">🦵</div>
      <div class="cat-info">
        <div class="cat-title">Pas dérivés du Tap-Up</div>
        <div class="cat-count">9 pas</div>
      </div>
      <div class="cat-arrow">›</div>
    </div>
  </div>
</section>

<!-- MARCHE CATEGORY SCREEN -->
<section id="screen-marche" class="screen">
  <div class="screen-header blue">
    <button class="btn-back" onclick="showScreen('home')">‹</button>
    <div class="screen-title">
      Pas dérivés de la marche
      <small>Sélectionne un pas</small>
    </div>
  </div>
  <div class="steps-grid" id="grid-marche"></div>
</section>

<!-- TAP-UP CATEGORY SCREEN -->
<section id="screen-tapup" class="screen">
  <div class="screen-header orange">
    <button class="btn-back" onclick="showScreen('home')">‹</button>
    <div class="screen-title">
      Pas dérivés du Tap-Up
      <small>Sélectionne un pas</small>
    </div>
  </div>
  <div class="steps-grid" id="grid-tapup"></div>
</section>

<!-- VIDEO SCREEN -->
<section id="screen-video" class="screen">
  <div class="video-header" id="video-header">
    <button class="btn-back" id="btn-back-video">‹</button>
    <div>
      <div class="video-title" id="video-title">BASIC</div>
      <div class="video-subtitle" id="video-subtitle"></div>
    </div>
  </div>
  <div class="video-wrapper">
    <video id="step-video" playsinline webkit-playsinline preload="none"></video>
    <div class="video-loading hidden" id="video-loading">
      <div class="spinner"></div>
      <span>Chargement…</span>
    </div>
  </div>
  <div class="video-controls">
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar-fill" id="progress-fill"></div>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn" onclick="seekBackward()">⏪</button>
      <button class="ctrl-btn" id="btn-replay" onclick="replayVideo()" title="Rejouer">↺</button>
      <button class="ctrl-btn play-btn" id="btn-play" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" id="btn-speed" onclick="cycleSpeed()" title="Vitesse">1×</button>
      <button class="ctrl-btn" onclick="seekForward()">⏩</button>
    </div>
    <div class="time-display" id="time-display">0:00 / 0:00</div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" onclick="navigateStep(-1)">‹ Précédent</button>
      <button class="nav-btn" id="btn-next" onclick="navigateStep(1)">Suivant ›</button>
    </div>
  </div>
</section>

<script>
const STEPS = {
  marche: [
    { id: 'basic',       name: 'BASIC',        desc: 'Pas simple • 4 temps', icon: '1️⃣', video: 'videos/basic.mov' },
    { id: 'vstep',       name: 'V STEP',       desc: 'Pas simple • 4 temps', icon: '✌️', video: 'videos/vstep.mov' },
    { id: 'mambo',       name: 'MAMBO',        desc: 'Pas syncopé',          icon: '💃', video: 'videos/mambo.mov' },
    { id: 'jazzsquare',  name: 'JAZZ SQUARE',  desc: 'Carré',                icon: '🔲', video: 'videos/jazzsquare.mov' },
    { id: 'tstep',       name: 'T STEP',       desc: 'Forme en T',           icon: '⊤',  video: 'videos/tstep.mov' },
    { id: 'pivot',       name: 'PIVOT',        desc: 'Rotation',             icon: '🔄', video: 'videos/pivot.mov' },
    { id: 'zstep',       name: 'Z STEP',       desc: 'Forme en Z',           icon: 'Ƶ',  video: 'videos/zstep.mov' },
    { id: 'reverseturn', name: 'REVERSE TURN', desc: 'Demi-tour',            icon: '↩️', video: 'videos/reverseturn.mov' },
  ],
  tapup: [
    { id: 'heelup',            name: 'HEEL UP',            desc: 'Talon levé',         icon: '🦶', video: 'videos/heelup.mov' },
    { id: 'kneeup',            name: 'KNEE UP',            desc: 'Genou levé',          icon: '🦵', video: 'videos/kneeup.mov' },
    { id: 'kick',              name: 'KICK',               desc: 'Coup de pied',        icon: '👟', video: 'videos/kick.mov' },
    { id: 'repeaters',         name: 'REPEATERS',          desc: 'Répétition',          icon: '🔁', video: 'videos/repeaters.mov' },
    { id: 'elevationlaterale', name: 'ÉLÉVATION LAT.',     desc: 'Élévation latérale',  icon: '↔️', video: 'videos/elevationlaterale.mov' },
    { id: 'lstep',             name: 'L STEP',             desc: 'Forme en L',          icon: '⌐',  video: 'videos/lstep.mov' },
    { id: 'chasse',            name: 'CHASSÉ',             desc: 'Glissé',              icon: '➡️', video: 'videos/chasse.mov' },
    { id: 'ciseaux',           name: 'CISEAUX',            desc: 'Croisé',              icon: '✂️', video: 'videos/ciseaux.mov' },
    { id: 'side',              name: 'SIDE',               desc: 'Latéral',             icon: '↕️', video: 'videos/side.mov' },
  ]
};

let currentCategory = 'marche';
let currentStepIndex = 0;
let speeds = [0.5, 0.75, 1, 1.25, 1.5];
let speedIndex = 2;

// Build grids
function buildGrids() {
  ['marche', 'tapup'].forEach(cat => {
    const grid = document.getElementById('grid-' + cat);
    const color = cat === 'marche' ? 'blue' : 'orange';
    STEPS[cat].forEach((step, i) => {
      const btn = document.createElement('button');
      btn.className = `step-btn ${color}`;
      btn.innerHTML = `
        <div class="step-btn-icon">${step.icon}</div>
        <div class="step-btn-name">${step.name}</div>
        <div class="step-btn-desc">${step.desc}</div>
      `;
      btn.onclick = () => openStep(cat, i);
      grid.appendChild(btn);
    });
  });
}

// Screen navigation
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name !== 'video') {
    const v = document.getElementById('step-video');
    v.pause();
  }
}

// Open a step video
function openStep(cat, index) {
  currentCategory = cat;
  currentStepIndex = index;
  const step = STEPS[cat][index];
  const isBlue = cat === 'marche';

  document.getElementById('video-title').textContent = step.name;
  document.getElementById('video-subtitle').textContent = step.desc;

  const header = document.getElementById('video-header');
  header.className = 'video-header ' + (isBlue ? 'blue' : 'orange');

  const playBtn = document.getElementById('btn-play');
  playBtn.className = 'ctrl-btn play-btn ' + (isBlue ? '' : 'orange-play');

  const progressFill = document.getElementById('progress-fill');
  progressFill.className = 'progress-bar-fill ' + (isBlue ? '' : 'orange-fill');

  document.getElementById('btn-back-video').onclick = () => showScreen(cat);

  // Update prev/next buttons
  const steps = STEPS[cat];
  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === steps.length - 1;

  // Load video
  const video = document.getElementById('step-video');
  speedIndex = 2; // reset speed
  document.getElementById('btn-speed').textContent = '1×';
  video.playbackRate = 1;

  showLoading(true);
  video.src = step.video;
  video.load();

  showScreen('video');
}

function navigateStep(dir) {
  const newIndex = currentStepIndex + dir;
  if (newIndex >= 0 && newIndex < STEPS[currentCategory].length) {
    openStep(currentCategory, newIndex);
  }
}

// Video controls
const video = document.getElementById('step-video');

video.addEventListener('loadeddata', () => {
  showLoading(false);
  updateTimeDisplay();
  video.play().catch(() => {});
  updatePlayBtn();
});

video.addEventListener('waiting', () => showLoading(true));
video.addEventListener('playing', () => { showLoading(false); updatePlayBtn(); });
video.addEventListener('pause', updatePlayBtn);
video.addEventListener('ended', () => { updatePlayBtn(); });

video.addEventListener('timeupdate', () => {
  if (!video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  updateTimeDisplay();
});

function updatePlayBtn() {
  document.getElementById('btn-play').textContent = video.paused ? '▶' : '⏸';
}

function togglePlay() {
  if (video.paused) video.play().catch(() => {});
  else video.pause();
}

function replayVideo() {
  video.currentTime = 0;
  video.play().catch(() => {});
}

function seekForward() { video.currentTime = Math.min(video.duration || 0, video.currentTime + 5); }
function seekBackward() { video.currentTime = Math.max(0, video.currentTime - 5); }

function cycleSpeed() {
  speedIndex = (speedIndex + 1) % speeds.length;
  const s = speeds[speedIndex];
  video.playbackRate = s;
  document.getElementById('btn-speed').textContent = s + '×';
}

function showLoading(show) {
  document.getElementById('video-loading').classList.toggle('hidden', !show);
}

function updateTimeDisplay() {
  const cur = formatTime(video.currentTime);
  const dur = formatTime(video.duration || 0);
  document.getElementById('time-display').textContent = `${cur} / ${dur}`;
}

function formatTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

// Progress bar tap/drag
const progressWrap = document.getElementById('progress-wrap');
progressWrap.addEventListener('click', (e) => {
  if (!video.duration) return;
  const rect = progressWrap.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  video.currentTime = pct * video.duration;
});

// Init
buildGrids();

// Register service worker for offline use
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
